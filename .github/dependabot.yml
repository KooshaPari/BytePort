# ============================================================================
# BytePort — Dependabot configuration
# ============================================================================
#
# L2 #29 (FLEET_100TASK_DAG_V3.md) — canonical dependabot baseline.
# Ecosystems:
#   - cargo            (root — Rust core / Tauri binary)
#   - npm              (frontend/web/ — React/TS dashboard)
#   - github-actions   (.github/workflows/)
#
# Schedule: weekly, staggered.
# ============================================================================

version: 2

updates:
  # --------------------------------------------------------------------------
  # Rust core (root — src-tauri binary + core crate)
  # --------------------------------------------------------------------------
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
      - "byteport"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # --------------------------------------------------------------------------
  # Frontend / web (npm)
  # --------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/frontend/web"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "byteport"
      - "frontend"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"
    commit-message:
      prefix: "chore(frontend-deps)"
      include: "scope"
    # Pin major framework upgrades to manual review
    ignore:
      - dependency-name: "react"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "vite"
        update-types:
          - "version-update:semver-major"

  # --------------------------------------------------------------------------
  # GitHub Actions (CI)
  # --------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
      - "byteport"
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
