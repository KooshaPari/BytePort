name: Go CI

on:

timeout-minutes: 45
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]


permissions:
  contents: read
jobs:
  go-build-test:
    name: Go build + test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend/byteport
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.23'
          cache-dependency-path: backend/byteport/go.sum
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: go vet
        run: go vet ./...
