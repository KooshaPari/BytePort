name: Go CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  go-build-test:
    name: Go build + test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend/byteport
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: backend/byteport/go.mod
          cache-dependency-path: backend/byteport/go.sum
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: go vet
        run: go vet ./...
