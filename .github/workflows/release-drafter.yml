name: Release Drafter

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
jobs:
  update_release_draft:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
