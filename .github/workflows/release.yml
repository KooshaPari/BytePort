# release.yml — BytePort release pipeline
#
# Consolidates:
#   - Tag-driven GitHub release creation
#   - Release-drafter draft updates on push to main
#
# Triggers: tag push (v*), push to main (drafter), manual.
# Concurrency: shared group; per-ref cancellation to avoid stale drafter runs.

name: Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # ---------- On tag: build release artifacts with Tauri ----------
  tauri-build:
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 60
    name: Build Tauri release artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - name: Install Node.js
        uses: actions/setup-node@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v4        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend/web/src-tauri
          tauriScript: npm run tauri -- build

  # ---------- On tag: publish GitHub release ----------
  release:
    needs: tauri-build
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    name: Publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: dist-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- On push to main: refresh release draft ----------
  draft:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    name: Update release draft
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
