name: Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  # On tag: build and upload Tauri release artifacts
  tauri-build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 60
    name: Build Tauri release artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend/web/src-tauri
          tauriScript: npm run tauri -- build
          includeRelease: true
          includeDebug: false

  # On push to main: refresh release draft
  draft:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    name: Update release draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
