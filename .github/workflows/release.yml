# release.yml — BytePort release pipeline
#
# Consolidates:
#   - Tag-driven GitHub release creation (was: release.yml)
#   - Release-drafter draft updates on push to main (was: release-drafter.yml)
#   - Monthly SBOM refresh via shared workflow (was: sbom-refresh.yml)
#
# Triggers: tag push (v*), push to main (drafter), monthly cron (sbom), manual.
# Concurrency: shared group; per-ref cancellation to avoid stale drafter runs.

name: Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  schedule:
    - cron: '0 0 1 * *'  # 1st of each month — SBOM refresh
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # ---------- On tag: build release artifacts with Tauri ----------
  tauri-build:
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 60
    name: Build Tauri release artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Node.js
        uses: actions/setup-node@60edb5dd8de00db5d5c64c9e3f6d6db5bf8f5d76 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@f7f7b7a1cf7bdf9d3dcd89d36e69a3d8f18f8f45 # stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release artifacts
        uses: tauri-apps/tauri-action@b85a6e2e1c5f0cd7ab5f00c4c286e2a6f3a5c5d1 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend/web/src-tauri
          tauriScript: npm run tauri -- build

  # ---------- On tag: publish GitHub release ----------
  release:
    needs: tauri-build
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    name: Publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91e9fd1d49c64fa67f4b6c1db8d8a3a7d6dd # v4
        with:
          path: dist-artifacts
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          draft: false
          generate_release_notes: true
          files: dist-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- On push to main: refresh release draft ----------
  draft:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    name: Update release draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- Monthly: refresh SBOM ----------
  sbom-refresh:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    name: Monthly SBOM refresh
    uses: KooshaPari/phenotype-tooling/.github/workflows/sbom-monthly.yml@79dff2b798fb8a3bc64237e4b2d054a08d3a4601
    with:
      repo_path: '.'
      build_system: 'rust'
