# sbom.yml — BytePort CycloneDX SBOM generation
#
# Generates a CycloneDX-formatted Software Bill of Materials on every
# release, PR, and manual dispatch. Uploads as a workflow artifact and
# attaches to GitHub Releases on tag pushes.
#
# Triggers: tag push (v*), PR to main, workflow_dispatch
# Concurrency: one in-flight run per ref; new commits cancel old runs.

name: Generate SBOM

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.18.0
        with:
          format: cyclonedx-json
          artifact-name: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.cdx.json
          retention-days: 90

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: sbom.cdx.json
