name: secrets-scan

on:
  schedule:
    # Weekly Monday 09:00 PDT (16:00 UTC) per ADR-042
    - cron: '0 16 * * 1'
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main
    paths-ignore:
      - '.git/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.gif'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: TruffleHog filesystem scan
        uses: trufflesecurity/trufflehog@b84c3d14d189e16da175e2c27fa8136603783ffc
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: ${{ github.head_ref }}
          extra_args: --debug --no-verification
