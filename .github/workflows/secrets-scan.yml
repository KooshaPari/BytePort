name: Secrets scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


permissions:
  contents: read
  actions: read
jobs:
  trufflehog:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@8a12e8e2fb6f3c4a4294a8e63b3659af6c08cfe3  # was: @main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
