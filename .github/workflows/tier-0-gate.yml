# tier-0-gate.yml — Tier-0 enforcement on PR
#
# Blocking gates for every BytePort PR: build, test, fmt, lint, typecheck
# across all three engines (Go, Rust, SvelteKit frontend).
#
# Trigger: every PR to main/master + push to main/master.
# Concurrency: one run per ref; new commits cancel in-flight runs.
#
# NOTE: phenotype-sdk is explicitly excluded (org policy).

name: Tier-0 Gate

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ──────────────────────────────────────────────────────────────────────
  # Go — backend/byteport
  # ──────────────────────────────────────────────────────────────────────
  go-build:
    name: Go build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/byteport/go.mod
          cache-dependency-path: backend/byteport/go.sum
      - name: go build
        working-directory: backend/byteport
        run: go build ./...

  go-test:
    name: Go test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend/byteport
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/byteport/go.mod
          cache-dependency-path: backend/byteport/go.sum
      - name: go test
        run: go test ./...

  go-vet:
    name: Go vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/byteport/go.mod
          cache-dependency-path: backend/byteport/go.sum
      - name: go vet
        working-directory: backend/byteport
        run: go vet ./...

  go-fmt:
    name: Go fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l backend/byteport backend/nvms 2>/dev/null || true)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
          echo "All Go files are correctly formatted."

  go-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/byteport/go.mod
          cache-dependency-path: backend/byteport/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend/byteport
          args: --disable=staticcheck --disable=errcheck

  # ──────────────────────────────────────────────────────────────────────
  # Rust — Tauri workspace (frontend/web/src-tauri)
  # ──────────────────────────────────────────────────────────────────────
  rust-build:
    name: Rust build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace

  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  # ──────────────────────────────────────────────────────────────────────
  # Frontend — SvelteKit (frontend/web)
  # ──────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json
      - name: Install dependencies
        working-directory: frontend/web
        run: npm ci --no-audit --no-fund
      - name: Build
        working-directory: frontend/web
        run: npm run build

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json
      - name: Install dependencies
        working-directory: frontend/web
        run: npm ci --no-audit --no-fund
      - name: Prettier check
        working-directory: frontend/web
        run: npx prettier --check .
      - name: ESLint
        working-directory: frontend/web
        run: npm run lint

  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json
      - name: Install dependencies
        working-directory: frontend/web
        run: npm ci --no-audit --no-fund
      - name: svelte-check
        working-directory: frontend/web
        run: npm run check
