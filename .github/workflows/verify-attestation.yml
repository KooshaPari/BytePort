name: Verify Release Attestation

on:
  workflow_run:
    workflows: ["Release Attestation"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  attestations: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: Verify workflow completed successfully
    runs-on: ubuntu-24.04
    steps:
      - name: Check triggering workflow result
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual verification dispatch."
            exit 0
          fi
          echo "Release Attestation workflow conclusion: ${{ github.event.workflow_run.conclusion }}"
