# Docker Compose deployment for realtime-chat-app
version: '3.8'

networks:
  byteport-chat-network:
    driver: bridge

services:
  # Backend service (Node.js + Express + Socket.IO)
  chat-backend:
    build:
      context: ./chat-app/server
      dockerfile_inline: |
        FROM node:18-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        COPY . .
        EXPOSE 5000
        CMD ["npm", "start"]
    container_name: byteport-chat-backend
    ports:
      - "5000:5000"
    networks:
      - byteport-chat-network
    restart: unless-stopped

  # Frontend service (React + Vite)
  chat-frontend:
    build:
      context: ./chat-app/client
      dockerfile_inline: |
        FROM node:18-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        COPY . .
        RUN npm run build
        RUN npm install -g serve
        EXPOSE 5173
        CMD ["serve", "-s", "dist", "-l", "5173"]
    container_name: byteport-chat-main
    ports:
      - "5173:5173"
    networks:
      - byteport-chat-network
    restart: unless-stopped
    depends_on:
      - chat-backend
