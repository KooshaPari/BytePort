# cargo-deny config for BytePort
#
# Every advisory ignore below MUST carry a specific RUSTSEC ID and a concrete
# justification (per repo policy: no silent suppressions, no wildcard ignores).
# Re-evaluate on every Tauri / dep bump and on each touch of this file.

[advisories]
version = 2
yanked = "deny"

# Cluster: unmaintained crates pulled in transitively by tauri 2.10.3
# (latest as of 2026-04). All 17 advisories below originate inside the Tauri
# 2.10.3 dependency tree (gtk3 stack via muda/wry/tao, urlpattern via
# tauri-utils, fxhash via kuchikiki). No upstream fix exists yet; tracking
# Tauri 2.11+ which is expected to migrate proc-macro-error -> proc-macro-error2
# and the gtk3 stack to gtk4-rs.
# Upstream tracking: https://github.com/tauri-apps/tauri/issues
ignore = [
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained -- transitive via tauri 2.10.3 -> glib-macros 0.18.5 (gtk3 stack); no upstream fix in Tauri 2.10.x" },
    { id = "RUSTSEC-2024-0411", reason = "gdkwayland-sys unmaintained (gtk3-rs archived) -- transitive via tauri 2.10.3 -> tao 0.34.8" },
    { id = "RUSTSEC-2024-0412", reason = "gdk unmaintained (gtk3-rs archived) -- transitive via tauri 2.10.3 -> wry 0.54.4 -> gdkx11" },
    { id = "RUSTSEC-2024-0413", reason = "atk unmaintained (gtk3-rs archived) -- transitive via tauri 2.10.3 -> muda 0.17.2 -> gtk 0.18.2" },
    { id = "RUSTSEC-2024-0414", reason = "gdkx11-sys unmaintained (gtk3-rs archived) -- transitive via tauri 2.10.3 -> wry 0.54.4 -> gdkx11" },
    { id = "RUSTSEC-2024-0415", reason = "gtk unmaintained (gtk3-rs archived; use gtk4-rs) -- transitive via tauri 2.10.3 -> muda 0.17.2" },
    { id = "RUSTSEC-2024-0416", reason = "atk-sys unmaintained (gtk3-rs archived) -- transitive via tauri 2.10.3 -> muda -> gtk -> atk" },
    { id = "RUSTSEC-2024-0417", reason = "gdkx11 unmaintained (gtk3-rs archived) -- transitive via tauri 2.10.3 -> wry 0.54.4" },
    { id = "RUSTSEC-2024-0418", reason = "gdk-sys unmaintained (gtk3-rs archived) -- transitive via tauri 2.10.3 -> wry -> gdkx11 -> gdk" },
    { id = "RUSTSEC-2024-0419", reason = "gtk3-macros unmaintained (gtk3-rs archived) -- transitive via tauri 2.10.3 -> muda -> gtk" },
    { id = "RUSTSEC-2024-0420", reason = "gtk-sys unmaintained (gtk3-rs archived) -- transitive via tauri 2.10.3 -> muda -> gtk" },
    { id = "RUSTSEC-2025-0057", reason = "fxhash unmaintained (use rustc-hash) -- transitive via tauri 2.10.3 -> tauri-utils -> kuchikiki -> selectors" },
    { id = "RUSTSEC-2025-0075", reason = "unic-char-range unmaintained (unic project archived) -- transitive via tauri 2.10.3 -> tauri-utils -> urlpattern -> unic-ucd-ident chain" },
    { id = "RUSTSEC-2025-0080", reason = "unic-common unmaintained (unic project archived) -- transitive via tauri 2.10.3 -> tauri-utils -> urlpattern -> unic-ucd-version" },
    { id = "RUSTSEC-2025-0081", reason = "unic-char-property unmaintained (unic project archived) -- transitive via tauri 2.10.3 -> tauri-utils -> urlpattern -> unic-ucd-ident" },
    { id = "RUSTSEC-2025-0098", reason = "unic-ucd-version unmaintained (unic project archived) -- transitive via tauri 2.10.3 -> tauri-utils -> urlpattern" },
    { id = "RUSTSEC-2025-0100", reason = "unic-ucd-ident unmaintained (unic project archived) -- transitive via tauri 2.10.3 -> tauri-utils -> urlpattern" },
]
