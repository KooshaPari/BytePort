# cargo-deny config for BytePort
#
# Every advisory ignore below MUST carry a specific RUSTSEC ID and a concrete
# justification (per repo policy: no silent suppressions, no wildcard ignores).
# Re-evaluate on every Tauri / dep bump and on each touch of this file.

[advisories]
version = 2
yanked = "deny"

ignore = []

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-3-Clause-Clear",
    "CC0-1.0",
    "CC-BY-SA-4.0",
    "GPL-3.0-only",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "BlueOak-1.0.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "WTFPL"
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
