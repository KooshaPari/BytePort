events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Define upstreams for all services (like ALB Target Groups)
    upstream fixit_backend {
        server byteport-fixit-backend:8081;
    }

    upstream fixit_frontend {
        server byteport-fixit-frontend:80;
    }

    upstream chat_backend {
        server byteport-chat-backend:5000;
    }

    upstream chat_frontend {
        server byteport-chat-frontend:80;
    }
    
    # Main server block (like ALB Listener)
    server {
        listen 80;
        server_name localhost;
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "BytePort Universal Proxy - Healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Service discovery endpoint
        location /services {
            access_log off;
            return 200 '{"services": ["fixit-go", "chat-app"], "endpoints": ["/fixit/*", "/chat/*"], "status": "active"}';
            add_header Content-Type application/json;
        }
        
        # ===== FIXIT-GO PROJECT ROUTES (like ALB Listener Rules) =====
        
        # Fixit backend API routes: /fixit/backend/* -> fixit_backend
        location /fixit/backend/ {
            rewrite ^/fixit/backend/(.*)$ /$1 break;
            proxy_pass http://fixit_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Fixit frontend routes: /fixit/* -> fixit_frontend
        location /fixit/ {
            rewrite ^/fixit/(.*)$ /$1 break;
            proxy_pass http://fixit_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ===== CHAT-APP PROJECT ROUTES (like ALB Listener Rules) =====
        
        # Chat backend API routes: /chat/api/* -> chat_backend
        location /chat/api/ {
            rewrite ^/chat/api/(.*)$ /$1 break;
            proxy_pass http://chat_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
        
        # Chat Socket.IO routes: /chat/socket.io/* -> chat_backend
        location /chat/socket.io/ {
            rewrite ^/chat/(.*)$ /$1 break;
            proxy_pass http://chat_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
            proxy_read_timeout 86400;
        }
        
        # Chat frontend routes: /chat/* -> chat_frontend
        location /chat/ {
            rewrite ^/chat/(.*)$ /$1 break;
            proxy_pass http://chat_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ===== DEFAULT ROUTES =====
        
        # Root route - show service directory
        location = / {
            return 200 '<!DOCTYPE html>
<html>
<head><title>BytePort Universal Proxy</title></head>
<body>
<h1>BytePort Universal Proxy</h1>
<h2>Available Services:</h2>
<ul>
<li><a href="/fixit/">Fixit-Go Application</a> (Go + Svelte)</li>
<li><a href="/chat/">Chat Application</a> (Node.js + React + Socket.IO)</li>
</ul>
<h2>API Endpoints:</h2>
<ul>
<li><a href="/fixit/backend/">Fixit Backend API</a></li>
<li><a href="/chat/api/">Chat Backend API</a></li>
</ul>
<p><strong>Status:</strong> All services operational</p>
</body>
</html>';
            add_header Content-Type text/html;
        }
        
    }
}
