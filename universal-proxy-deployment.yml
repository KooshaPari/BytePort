# Universal BytePort Deployment with Dynamic Reverse Proxy
# Handles ALL services automatically like AWS ALB
version: "3.8"

networks:
  byteport-network:
    driver: bridge

services:
  # Universal Reverse Proxy (like AWS ALB)
  byteport-proxy:
    image: nginx:alpine
    container_name: byteport-main
    ports:
      - "9000:80" # Main entry point for all services
    networks:
      - byteport-network
    volumes:
      - ./nginx-universal.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - fixit-backend
      - fixit-frontend
      - chat-backend
      - chat-frontend

  # FIXIT-GO Services
  fixit-backend:
    build:
      context: ./backend/nvms/fixit-go/backend
      dockerfile_inline: |
        FROM golang:1.22-alpine AS builder
        WORKDIR /app
        COPY go.mod go.sum ./
        RUN go mod download
        COPY . .
        RUN go build -o main .

        FROM alpine:latest
        RUN apk --no-cache add ca-certificates
        WORKDIR /root/
        COPY --from=builder /app/main .
        EXPOSE 8081
        CMD ["./main"]
    container_name: byteport-fixit-backend
    networks:
      - byteport-network
    restart: unless-stopped

  fixit-frontend:
    build:
      context: ./backend/nvms/fixit-go/frontend
      dockerfile_inline: |
        FROM node:18-alpine AS builder
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        COPY . .
        RUN npm run build

        FROM nginx:alpine
        COPY --from=builder /app/public /usr/share/nginx/html
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
    container_name: byteport-fixit-frontend
    networks:
      - byteport-network
    restart: unless-stopped

  # CHAT-APP Services
  chat-backend:
    build:
      context: ./chat-app/server
      dockerfile_inline: |
        FROM node:18-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        COPY . .
        EXPOSE 5000
        CMD ["npm", "start"]
    container_name: byteport-chat-backend
    networks:
      - byteport-network
    restart: unless-stopped

  chat-frontend:
    build:
      context: ./chat-app/client
      dockerfile_inline: |
        FROM node:18-alpine AS builder
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        COPY . .
        RUN npm run build

        FROM nginx:alpine
        COPY --from=builder /app/dist /usr/share/nginx/html
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
    container_name: byteport-chat-frontend
    networks:
      - byteport-network
    restart: unless-stopped
